<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/sidebar.css">
</head>
<body>
    <header class="header">
        <div class="header-brand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <span>Drift Reports</span>
        </div>
        <div class="header-actions">
            <a href="index.html" class="btn btn-secondary">← Home</a>
            <button onclick="dashboardApp.runDriftCheck()">🔍 Run Drift Check</button>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><h3>Navigation</h3></div>
            <nav class="sidebar-nav">
                <div class="sidebar-section">
                    <div class="sidebar-section-title">Main</div>
                    <a href="index.html" class="sidebar-link">📊 Dashboard</a>
                    <a href="monitoring.html" class="sidebar-link">📈 Monitoring</a>
                    <a href="drift.html" class="sidebar-link active">🔒 Drift Reports</a>
                </div>
                <div class="sidebar-divider"></div>
                <div class="sidebar-section">
                    <div class="sidebar-section-title">Kanban</div>
                    <a href="kanban/change.html" class="sidebar-link">📋 Change Kanban</a>
                    <a href="kanban/maintenance.html" class="sidebar-link">🔧 Maintenance</a>
                </div>
                <div class="sidebar-divider"></div>
                <div class="sidebar-section">
                    <div class="sidebar-section-title">Wiki</div>
                    <a href="wiki-browser.html" class="sidebar-link">📚 Wiki Browser</a>
                    <a href="sites.html" class="sidebar-link">🌐 Sites Overview</a>
                </div>
                <div class="sidebar-divider"></div>
                <div class="sidebar-section">
                    <div class="sidebar-section-title">System</div>
                    <a href="agents.html" class="sidebar-link">🤖 Agent Protocol</a>
                    <a href="settings.html" class="sidebar-link">⚙️ Settings</a>
                </div>
            </nav>
            <div class="sidebar-footer"><p>GRID Wiki v1.0</p></div>
        </aside>

        <main class="main-content" id="main-content">
            <div class="spinner"></div>
            <p class="text-center text-muted">Loading drift reports...</p>
        </main>
    </div>

    <button class="sidebar-toggle" onclick="sidebar.toggle()">☰</button>

    <script src="../js/api.js"></script>
    <script src="../js/dashboard.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/chatbox.js"></script>
    <script>
        const originalRender = DashboardApp.prototype.renderCurrentView;
        DashboardApp.prototype.renderCurrentView = async function() {
            const container = document.getElementById('main-content');
            await this.renderDrift(container);
        };
    </script>
</body>
